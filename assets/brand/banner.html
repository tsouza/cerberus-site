<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<!--
  README hero banner generator. 1280x640. Source of truth for the
  <picture> pair the cerberus README swaps by prefers-color-scheme:
    readme-banner-1280x640.png        (dark  — default / fallback)
    readme-banner-light-1280x640.png  (light)

  Regenerate (headless Chrome bakes the real webfonts into the PNG;
  rendered at 2x then downscaled so the wordmark stays crisp):
    for t in dark light; do
      out=$([ "$t" = dark ] && echo readme-banner-1280x640 || echo readme-banner-light-1280x640)
      google-chrome --headless --disable-gpu --hide-scrollbars \
        --force-device-scale-factor=2 --window-size=1280,640 \
        --virtual-time-budget=4500 \
        --screenshot=/tmp/$out-2x.png \
        "file://$PWD/assets/brand/banner.html?theme=$t"
      convert /tmp/$out-2x.png -resize 1280x640 assets/brand/$out.png
    done

  Colours mirror css/tokens.css; the only light-theme values live here
  because the site itself is dark-only.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Hanken+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0C0F;
    --grid: rgba(255, 255, 255, .035);
    --wordmark: #F2F5F9;
    --tagline: #A2ABB8;
    --chip-text: #C7CEDA;
    --chip-border: #20272F;
    --divider: #283039;
    --footer: #5A6473;
    --glow: rgba(124, 140, 255, .18);
    /* brand constants — identical on both themes */
    --sky: #38BDF8;    /* PromQL    */
    --green: #34D399;  /* LogQL     */
    --rose: #FB7185;   /* TraceQL   */
    --indigo: #7C8CFF; /* ClickHouse / node */
  }
  html[data-theme="light"] {
    --bg: #FFFFFF;
    --grid: rgba(10, 12, 15, .045);
    --wordmark: #0B0E13;
    --tagline: #586273;
    --chip-text: #2C3543;
    --chip-border: #E2E7EE;
    --divider: #D4DAE3;
    --footer: #8A95A4;
    --glow: rgba(124, 140, 255, .12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    position: relative;
    overflow: hidden;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* soft brand glow behind the mark */
  body::before {
    content: "";
    position: absolute;
    top: -120px; left: 50%;
    width: 720px; height: 520px;
    transform: translateX(-50%);
    background: radial-gradient(50% 50% at 50% 50%, var(--glow), transparent 70%);
    pointer-events: none;
  }
  .stage {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding-bottom: 8px;
  }
  .mark { width: 84px; height: 84px; filter: drop-shadow(0 0 22px var(--glow)); }
  .wordmark {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-weight: 600;
    font-size: 104px;
    letter-spacing: -2.5px;
    line-height: 1;
    color: var(--wordmark);
  }
  .tagline {
    font-size: 30px;
    font-weight: 400;
    letter-spacing: .2px;
    color: var(--tagline);
    margin-top: -6px;
  }
  .chips {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 10px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 19px;
    font-weight: 500;
  }
  .chip { display: inline-flex; align-items: center; gap: 9px; color: var(--chip-text); }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .divider { width: 1px; height: 22px; background: var(--divider); }
  .footer {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px;
    letter-spacing: .3px;
    color: var(--footer);
  }
</style>
</head>
<body>
  <div class="stage">
    <svg class="mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="14.38" y1="8.1" x2="6.62" y2="22.9" stroke="#38BDF8" stroke-width="3.1" stroke-linecap="round"></line>
      <line x1="17.62" y1="8.1" x2="25.38" y2="22.9" stroke="#FB7185" stroke-width="3.1" stroke-linecap="round"></line>
      <line x1="8.5" y1="26" x2="23.5" y2="26" stroke="#34D399" stroke-width="3.1" stroke-linecap="round"></line>
      <circle cx="16" cy="18.6" r="2.9" fill="#7C8CFF"></circle>
    </svg>
    <div class="wordmark">cerberus</div>
    <div class="tagline">Three query languages, one backend.</div>
    <div class="chips">
      <span class="chip"><span class="dot" style="background:#38BDF8"></span>PromQL</span>
      <span class="chip"><span class="dot" style="background:#34D399"></span>LogQL</span>
      <span class="chip"><span class="dot" style="background:#FB7185"></span>TraceQL</span>
      <span class="divider"></span>
      <span class="chip"><span class="dot" style="background:#7C8CFF"></span><span style="color:#7C8CFF">ClickHouse</span></span>
    </div>
  </div>
  <div class="footer">Apache-2.0 &nbsp;·&nbsp; drop-in Prometheus / Loki / Tempo API on ClickHouse</div>
  <script>
    // ?theme=light|dark drives the palette; headless Chrome can't toggle
    // prefers-color-scheme from the CLI, so we read it off the URL.
    const t = new URLSearchParams(location.search).get('theme');
    if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
  </script>
</body>
</html>
